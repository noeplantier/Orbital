name: MetaCity
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.6.0

options:
  bundleIdPrefix: com.metacity
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: "YES"

targets:
  MetaCity:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MetaCity
    info:
      path: MetaCity/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "MetaCity uses your location to center the map, find nearby landmarks, and power live presence."
        NSLocationAlwaysAndWhenInUseUsageDescription: "MetaCity can keep showing your position to nearby friends while the app is in the background."
        NSCameraUsageDescription: "MetaCity needs camera access for video calls and to power the AR landmark experience."
        NSMicrophoneUsageDescription: "MetaCity needs microphone access so other participants can hear you on a call."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metacity.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore

  MetaCityTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MetaCityTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.metacity.app.tests
    dependencies:
      - target: MetaCity

schemes:
  MetaCity:
    build:
      targets:
        MetaCity: all
        MetaCityTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MetaCityTests
    archive:
      config: Release
