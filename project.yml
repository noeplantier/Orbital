name: OrbitalApp
options:
  bundleIdPrefix: com.orbital
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: "YES"

targets:
  OrbitalApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OrbitalApp
    info:
      path: OrbitalApp/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "Orbital uses your location to center the map and show places near you."
        NSCameraUsageDescription: "Orbital needs camera access so other participants can see you on a video call."
        NSMicrophoneUsageDescription: "Orbital needs microphone access so other participants can hear you on a call."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orbital.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
    dependencies: []

  OrbitalAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OrbitalAppTests
    dependencies:
      - target: OrbitalApp

schemes:
  OrbitalApp:
    build:
      targets:
        OrbitalApp: all
        OrbitalAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OrbitalAppTests
    archive:
      config: Release
